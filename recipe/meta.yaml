{% set python_min = "3.11" %}
{% set name = "crowsetta" %}
{% set version = "5.1.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/crowsetta-{{ version }}.tar.gz
  sha256: 7722f094076d657a66f3b27f0128a5516c24c3a86471e4a845bea56e9a22f3fb

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - flit-core
  run:
    - appdirs >=1.4.4
    - attrs >=25.3.0
    - numpy >=1.26.0
    - pandas >=2.1.0
    - pandera >=0.25.0
    - python >={{ python_min }}
    - scipy >=1.12.0
    - pysoundfile >=0.13.1

test:
  imports:
    - crowsetta
  commands:
    - pip check
  requires:
    # place temporary upper bound on pip so pip check does not fail on soundfile
    # see https://github.com/conda-forge/pysoundfile-feedstock/issues/22
    - pip <24.2
    - python {{ python_min }}

about:
  home: https://pypi.org/project/crowsetta/
  summary: A Python tool to work with any format for annotating animal vocalizations and bioacoustics data
  dev_url: https://github.com/vocalpy/crowsetta
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - NickleDave
